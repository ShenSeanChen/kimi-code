name: Refresh Research Workbench

on:
  # Manual trigger
  workflow_dispatch:

  # Scheduled trigger: every Sunday at 06:00 UTC
  # Adjust the cron expression as needed.
  schedule:
    - cron: '0 6 * * 0'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data and rebuild deliverables
        run: |
          python 1_fetch_data.py
          python 2_build_excel.py
          python 3_build_html.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-refresh research workbench data [$(date -u +%Y-%m-%d)]"
          git push
